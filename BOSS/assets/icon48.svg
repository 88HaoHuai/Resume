<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5"/>
      <stop offset="100%" style="stop-color:#7C3AED"/>
    </linearGradient>
    <linearGradient id="badge" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22C55E"/>
      <stop offset="100%" style="stop-color:#16A34A"/>
    </linearGradient>
  </defs>
  <!-- 背景圆角矩形 -->
  <rect width="48" height="48" rx="10" fill="url(#bg)"/>
  <!-- 人物头部 -->
  <circle cx="24" cy="16" r="7" fill="white" opacity="0.95"/>
  <!-- 人物身体 -->
  <ellipse cx="24" cy="35" rx="13" ry="9" fill="white" opacity="0.95"/>
  <!-- 绿色消息气泡（角标） -->
  <circle cx="38" cy="10" r="8" fill="url(#badge)"/>
  <path d="M34 8 L38 12 L43 6" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
